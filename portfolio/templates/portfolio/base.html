<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Portfólio{% endblock %}</title>

    <style>
      :root{
        --bg:#0b1220;
        --panel:#0f1a2e;
        --text:#e6edf7;
        --muted:#97a6c1;
        --line:rgba(255,255,255,.08);
        --accent:#22d3ee;
        --accent2:#a78bfa;
        --shadow: 0 18px 45px rgba(0,0,0,.45);
        --radius: 16px;
      }
      *{box-sizing:border-box}
      html,body{height:100%}
      body{
        margin:0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial;
        background:
          radial-gradient(1200px 600px at 10% -10%, rgba(34,211,238,.18), transparent 55%),
          radial-gradient(900px 500px at 90% 0%, rgba(167,139,250,.14), transparent 52%),
          radial-gradient(1100px 700px at 50% 110%, rgba(34,211,238,.10), transparent 55%),
          var(--bg);
        color:var(--text);
        line-height:1.5;
      }
      a{color:inherit; text-decoration:none}
      .wrap{max-width:1100px; margin:0 auto; padding:0 22px}

      /* NAV */
      .nav{
        position:sticky; top:0; z-index:50;
        backdrop-filter: blur(10px);
        background: rgba(11,18,32,.55);
        border-bottom: 1px solid var(--line);
      }
      .nav-inner{display:flex; align-items:center; justify-content:space-between; padding:14px 0}
      .brand{display:flex; gap:12px; align-items:center}
      .dot{width:10px; height:10px; border-radius:999px; background:var(--accent); box-shadow: 0 0 0 6px rgba(34,211,238,.10)}
      .brand h1{margin:0; font-size:15px; letter-spacing:.2px; font-weight:650}
      .nav-links{display:flex; gap:16px; align-items:center}
      .nav-links a{font-size:13px; color:var(--muted)}
      .nav-links a:hover{color:var(--text)}
      .btn{
        display:inline-flex; align-items:center; justify-content:center;
        padding:10px 14px; border-radius:999px; font-size:13px; font-weight:600;
        border:1px solid var(--line);
        background: rgba(255,255,255,.02);
        cursor: pointer;
      }
      .btn:hover{border-color: rgba(34,211,238,.35)}
      .btn.primary{border-color: rgba(34,211,238,.35); background: rgba(34,211,238,.10)}

      /* HERO */
      .hero{padding:56px 0 30px}
      .kicker{display:inline-flex; gap:10px; align-items:center; color:var(--muted); font-size:13px; margin-bottom:14px}
      .pill{border:1px solid var(--line); padding:6px 10px; border-radius:999px; background: rgba(255,255,255,.02)}
      .hero h2{margin:0 0 12px; font-size:44px; line-height:1.08; letter-spacing:-.6px}
      .grad{background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip:text; background-clip:text; color:transparent}
      .hero p{margin:0 0 20px; max-width:720px; color:var(--muted); font-size:16px}
      .hero-actions{display:flex; gap:12px; flex-wrap:wrap; margin-top:14px}
      .meta{margin-top:26px; display:flex; gap:18px; flex-wrap:wrap; color:var(--muted); font-size:13px}
      .meta span{display:inline-flex; gap:8px; align-items:center}
      .meta i{width:7px; height:7px; border-radius:999px; background: rgba(167,139,250,.75)}

      /* SECTIONS */
      section{padding:30px 0}
      .section-title{display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin:0 0 14px}
      .section-title h3{margin:0; font-size:18px; letter-spacing:.2px}
      .section-title p{margin:0; color:var(--muted); font-size:13px}
      .divider{height:1px; background:var(--line); margin:18px 0 0}

      /* CARDS */
      .grid{display:grid; gap:14px}
      .grid.cols-3{grid-template-columns: repeat(3, minmax(0, 1fr))}
      .grid.cols-2{grid-template-columns: repeat(2, minmax(0, 1fr))}
      @media (max-width: 980px){
        .hero h2{font-size:38px}
        .grid.cols-3{grid-template-columns: repeat(2, minmax(0, 1fr))}
      }
      @media (max-width: 680px){
        .hero h2{font-size:32px}
        .grid.cols-3,.grid.cols-2{grid-template-columns: 1fr}
        .nav-links{display:none}
      }
      .card{
        border:1px solid var(--line);
        background: rgba(15,26,46,.70);
        border-radius: var(--radius);
        padding:16px;
        box-shadow: var(--shadow);
      }
      .card:hover{border-color: rgba(34,211,238,.28)}
      .thumb{
        height:120px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background:
          linear-gradient(135deg, rgba(34,211,238,.15), rgba(167,139,250,.10)),
          radial-gradient(300px 140px at 20% 30%, rgba(34,211,238,.25), transparent 60%),
          radial-gradient(280px 140px at 80% 70%, rgba(167,139,250,.18), transparent 60%);
        margin-bottom: 12px;
      }
      .card h4{margin:0 0 6px; font-size:15px}
      .card p{margin:0 0 10px; color:var(--muted); font-size:13px}
      .tags{display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 0}
      .tag{font-size:12px; color:var(--muted); border:1px solid var(--line); padding:6px 10px; border-radius:999px; background: rgba(255,255,255,.02)}
      .card .row{display:flex; justify-content:space-between; gap:10px; align-items:center; margin-top:12px}
      .mini a{color:var(--muted); font-size:13px}
      .mini a:hover{color:var(--text)}

      /* ABOUT */
      .about{display:grid; grid-template-columns: 1.1fr .9fr; gap:14px}
      @media (max-width: 900px){.about{grid-template-columns:1fr}}
      .bio{padding:18px}
      .bio p{margin:0; color:var(--muted); font-size:14px}
      .bio strong{color:var(--text)}
      .stats{display:grid; gap:14px}
      .stat{padding:16px}
      .stat b{display:block; font-size:14px; margin-bottom:6px}
      .stat span{color:var(--muted); font-size:13px}

      /* PHOTO */
      .about-left{display:flex; gap:16px; align-items:flex-start}
      .avatar{
        width:88px; height:88px; border-radius:999px;
        border:1px solid var(--line);
        background: rgba(255,255,255,.03);
        overflow:hidden;
        flex: 0 0 auto;
      }
      .avatar img{width:100%; height:100%; object-fit:cover; display:block}

      /* TIMELINE */
      .timeline{display:grid; gap:10px}
      .titem{display:flex; gap:12px; align-items:flex-start}
      .titem .bullet{width:10px; height:10px; border-radius:999px; background:var(--accent); margin-top:6px; box-shadow: 0 0 0 6px rgba(34,211,238,.10)}
      .titem .body{flex:1}
      .titem .body b{display:block; font-size:13px}
      .titem .body small{color:var(--muted)}
      .titem .body p{margin:6px 0 0; color:var(--muted); font-size:13px}

      /* FOOTER */
      footer{padding:28px 0 40px; color:var(--muted); font-size:13px}
      .foot{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap}
      .links{display:flex; gap:14px}
      .links a:hover{color:var(--text)}
    </style>
  </head>

  <body>
    <header class="nav">
      <div class="wrap nav-inner">
        <a class="brand" href="{% url 'portfolio:home' %}">
          <span class="dot"></span>
          <h1>
            {% if profile %}{{ profile.full_name }} • Portfólio{% else %}Portfólio{% endif %}
          </h1>
        </a>

        <nav class="nav-links" aria-label="Navegação">
          <a href="#about">Sobre</a>
          <a href="#projects">Projetos</a>
          <a href="#experience">Experiência</a>
          <a href="#contact">Contato</a>
        </nav>

        {% if profile and profile.cv_url %}
          <a class="btn" href="{{ profile.cv_url }}" target="_blank" rel="noreferrer">Baixar CV</a>
        {% else %}
          <a class="btn" href="#contact">Contato</a>
        {% endif %}
      </div>
    </header>

    {% block content %}{% endblock %}

    <script>
      const y = document.getElementById('y');
      if (y) y.textContent = new Date().getFullYear();
    </script>
  </body>
</html>
